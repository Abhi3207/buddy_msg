<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #818cf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1e293b;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      color: #818cf8;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    a:hover {
      background: #1e293b;
      border-color: #818cf8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 Messaging System</h1>
    <p class="subtitle">Real-time messaging API powered by Express &amp; Socket.IO</p>
    <div class="status">
      <span class="status-dot"></span>
      <span>Server running</span>
    </div>
    <div class="links">
      <a href="/health">Health Check</a>
      <a href="/api/v1/auth/register" onclick="return false;" title="POST endpoint — use an API client">API Docs</a>
    </div>
  </div>
</body>
</html>
